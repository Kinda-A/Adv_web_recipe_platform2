services:
  - type: web
    name: adv-web-app
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: RUN_MIGRATIONS
        value: 'true'
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-db
      - key: DB_PORT
        value: '3306'
      - key: DB_DATABASE
        value: recipe_sharing
      - key: DB_USERNAME
        value: laravel
      - key: DB_PASSWORD
        value: secret

  - type: private_service
    name: mysql-db
    env: docker
    plan: starter
    dockerfilePath: ./mysql.Dockerfile
    autoDeploy: true
    envVars:
      - key: MYSQL_DATABASE
        value: recipe_sharing
      - key: MYSQL_USER
        value: laravel
      - key: MYSQL_PASSWORD
        value: secret
      - key: MYSQL_ROOT_PASSWORD
        value: rootsecret
